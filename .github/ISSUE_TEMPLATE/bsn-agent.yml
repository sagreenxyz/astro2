name: Invoke BSN Curriculum Agent
description: Request the BSN Curriculum Agent to create, update, or align nursing educational content in the LMS.
title: '[BSN-User-Agent]: '
labels:
  - bsn
  - user-agent
body:
  - type: markdown
    attributes:
      value: |
        Use this template to invoke the **BSN Curriculum Agent** to create or update nursing educational content.

        The agent can produce course modules, encyclopedia entries, reference notes, quizzes, and presentations.
        It will automatically determine the appropriate **AACN Essentials (2021)**, **QSEN competencies**,
        **NCLEX-NG**, **CCNE/ACEN accreditation standard** alignments, and course level from the content you provide.

        Fill in as many fields as possible. The more context you provide, the higher the agent's confidence and the
        better the resulting content. Required fields are marked with an asterisk (*).

  - type: input
    id: title
    attributes:
      label: Suggested Title or Topic *
      description: A descriptive title or subject for the content.
      placeholder: 'e.g., Fluid and Electrolyte Balance in Acute Care'
    validations:
      required: true

  - type: dropdown
    id: content_type
    attributes:
      label: Content Type *
      description: What type of LMS content should be created or updated?
      options:
        - Course module
        - Course syllabus
        - Curriculum map
        - Encyclopedia entry
        - Lesson plan
        - Learning objectives
        - Lecture outline / reading guide
        - Reference note
        - NCLEX-style quiz questions
        - Quiz / Assessment
        - Case study / clinical scenario
        - Unfolding case study
        - Simulation lab instructions
        - Assessment rubric
        - Discussion prompt
        - Evidence-based practice (EBP) assignment
        - Presentation
    validations:
      required: true

  - type: textarea
    id: content
    attributes:
      label: Content or Context *
      description: >
        Paste raw notes, lecture material, topic descriptions, or any reference material
        the agent should use as a basis for the content. The more detail provided, the better the output.
      placeholder: |
        Describe the topic, paste raw notes, or provide reference material...
    validations:
      required: false

  - type: dropdown
    id: visibility
    attributes:
      label: Visibility *
      description: Should the content be publicly accessible or limited to authenticated users?
      options:
        - public
        - protected
    validations:
      required: true

  - type: textarea
    id: special_instructions
    attributes:
      label: Special Instructions for the Agent
      description: Any additional guidance, constraints, or context the BSN Curriculum Agent should follow.
      placeholder: |
        e.g., Focus on NCLEX-style application questions. Use a clinical scenario format.
        Cross-reference the existing encyclopedia entry on acid-base balance.
