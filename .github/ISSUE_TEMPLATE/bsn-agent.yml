name: Invoke BSN Curriculum Agent
description: Request the BSN Curriculum Agent to create, update, or align nursing educational content in the LMS.
title: '[BSN]: '
labels:
  - bsn
  - submission
body:
  - type: markdown
    attributes:
      value: |
        Use this template to invoke the **BSN Curriculum Agent** to create, update, or align nursing educational content.

        The agent can produce course modules, encyclopedia entries, reference notes, quizzes, and presentations — all
        aligned with **AACN Essentials (2021)**, **QSEN competencies**, **NCLEX-NG**, and **CCNE/ACEN accreditation standards**.

        Fill in as many fields as possible. The more context you provide, the higher the agent's confidence and the
        better the resulting content. Required fields are marked with an asterisk (*).

  - type: dropdown
    id: action_type
    attributes:
      label: Requested Action *
      description: What should the BSN Curriculum Agent do?
      options:
        - Create new content
        - Update / enhance existing content
        - Review and align existing content with nursing frameworks
        - Generate quiz or assessment questions
        - Cross-reference and link related content
    validations:
      required: true

  - type: dropdown
    id: content_type
    attributes:
      label: Content Type *
      description: What type of LMS content should be created or updated?
      options:
        - Course module
        - Encyclopedia entry
        - Reference note
        - Quiz / Assessment
        - Presentation
    validations:
      required: true

  - type: input
    id: title
    attributes:
      label: Suggested Title or Topic *
      description: A descriptive title or subject for the content.
      placeholder: 'e.g., Fluid and Electrolyte Balance in Acute Care'
    validations:
      required: true

  - type: textarea
    id: content
    attributes:
      label: Content or Context *
      description: >
        Paste raw notes, lecture material, topic descriptions, or any reference material
        the agent should use as a basis for the content. The more detail provided, the better the output.
      placeholder: |
        Describe the topic, paste raw notes, or provide reference material...
    validations:
      required: true

  - type: textarea
    id: learning_objectives
    attributes:
      label: Learning Objectives
      description: List specific learning objectives for this content (one per line). These will be stored in the content's frontmatter.
      placeholder: |
        1. Identify signs and symptoms of fluid volume imbalance.
        2. Select appropriate nursing interventions for common electrolyte disturbances.
        3. Apply the Clinical Judgment Measurement Model to fluid and electrolyte scenarios.

  - type: checkboxes
    id: aacn_essentials
    attributes:
      label: AACN Essentials Alignment (2021)
      description: Select the AACN Essentials domains this content addresses. Leave blank if unknown — the agent will infer.
      options:
        - label: 'D1 — Knowledge for Nursing Practice'
        - label: 'D2 — Person-Centered Care'
        - label: 'D3 — Population Health'
        - label: 'D4 — Scholarship for the Nursing Discipline'
        - label: 'D5 — Quality and Safety'
        - label: 'D6 — Interprofessional Partnerships'
        - label: 'D7 — Systems-Based Practice'
        - label: 'D8 — Informatics and Healthcare Technologies'
        - label: 'D9 — Professionalism'
        - label: 'D10 — Personal, Professional, and Leadership Development'

  - type: checkboxes
    id: qsen_competencies
    attributes:
      label: QSEN Competency Alignment
      description: Select the QSEN competencies this content addresses. Leave blank if unknown — the agent will infer.
      options:
        - label: 'PCC — Patient-Centered Care'
        - label: 'TC — Teamwork and Collaboration'
        - label: 'EBP — Evidence-Based Practice'
        - label: 'QI — Quality Improvement'
        - label: 'S — Safety'
        - label: 'I — Informatics'

  - type: checkboxes
    id: nclex_layers
    attributes:
      label: NCLEX-NG Clinical Judgment Layers
      description: Select the NCLEX-NG Clinical Judgment Measurement Model (CJMM) layers this content addresses.
      options:
        - label: 'RC — Recognize Cues'
        - label: 'AC — Analyze Cues'
        - label: 'PH — Prioritize Hypotheses'
        - label: 'GS — Generate Solutions'
        - label: 'TA — Take Action'
        - label: 'EO — Evaluate Outcomes'

  - type: checkboxes
    id: nclex_categories
    attributes:
      label: NCLEX-NG Client Needs Categories
      description: >
        Select the NCLEX-NG Client Needs categories relevant to this content. SECE and PhysI are top-level
        categories; MC/SIC are subcategories of SECE, and BCC/PPT/RRP/PA are subcategories of PhysI.
        Select the most specific level that applies.
      options:
        - label: 'SECE — Safe and Effective Care Environment'
        - label: 'SECE › MC — Management of Care'
        - label: 'SECE › SIC — Safety and Infection Control'
        - label: 'HPM — Health Promotion and Maintenance'
        - label: 'PI — Psychosocial Integrity'
        - label: 'PhysI — Physiological Integrity'
        - label: 'PhysI › BCC — Basic Care and Comfort'
        - label: 'PhysI › PPT — Pharmacological and Parenteral Therapies'
        - label: 'PhysI › RRP — Reduction of Risk Potential'
        - label: 'PhysI › PA — Physiological Adaptation'

  - type: checkboxes
    id: accreditation_refs
    attributes:
      label: Accreditation Standard References
      description: Select applicable CCNE or ACEN accreditation standards this content supports.
      options:
        - label: 'CCNE-I — Mission and Governance'
        - label: 'CCNE-II — Institutional Commitment and Resources'
        - label: 'CCNE-III — Curriculum, Teaching-Learning Practices, and Individual Program Outcomes'
        - label: 'CCNE-IV — Program Effectiveness: Assessment and Achievement of Program Outcomes'
        - label: 'ACEN-1 — Mission and Administrative Capacity'
        - label: 'ACEN-2 — Faculty and Staff'
        - label: 'ACEN-3 — Students'
        - label: 'ACEN-4 — Curriculum'
        - label: 'ACEN-5 — Resources'
        - label: 'ACEN-6 — Outcomes'

  - type: dropdown
    id: level
    attributes:
      label: Course Level
      description: For course modules — select the intended student level.
      options:
        - beginner
        - intermediate
        - advanced
        - Not applicable

  - type: dropdown
    id: visibility
    attributes:
      label: Visibility *
      description: Should the content be publicly accessible or limited to authenticated users?
      options:
        - public
        - private
        - protected
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated tags to categorize this content.
      placeholder: 'fluid balance, electrolytes, acute care, pharmacology'

  - type: input
    id: related_links
    attributes:
      label: Related Content Links
      description: Comma-separated paths to related LMS pages (encyclopedia entries, courses, notes).
      placeholder: '/encyclopedia/acid-base-balance, /courses/med-surg-fundamentals'

  - type: textarea
    id: special_instructions
    attributes:
      label: Special Instructions for the Agent
      description: Any additional guidance, constraints, or context the BSN Curriculum Agent should follow.
      placeholder: |
        e.g., Focus on NCLEX-style application questions. Use a clinical scenario format.
        Cross-reference the existing encyclopedia entry on acid-base balance.
